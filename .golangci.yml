# ─────────────────────────────────────────────────────────────────────────────
# An opinionated golangci-lint config for idiomatic Go.
#
# Every linter is enabled explicitly (`default: none`) and annotated — nothing
# runs that isn't listed below. The bar for inclusion: catch real bugs, or
# enforce documented Go idiom (Effective Go, Go Code Review Comments, godoc
# conventions). On top of that sit a few deliberate strictness opinions —
# no package-level state, no init functions, wrapped external errors — chosen
# so that generated and hand-written code are held to the same bar.
#
# Usage: copy this file to your repo root as `.golangci.yml`, then:
#   golangci-lint run        # lint
#   golangci-lint run --fix  # lint and apply auto-fixes
#   golangci-lint fmt        # format
#
# Requires golangci-lint v2.x (tested with v2.12.2). No further setup needed:
# import grouping detects your module path from go.mod automatically.
#
# Source: https://github.com/TylerDavidBailey/golangci-lint-config
# Docs:   https://golangci-lint.run/docs/
# ─────────────────────────────────────────────────────────────────────────────
version: "2"

linters:
  default: none
  enable:
    # defaults
    - errcheck # unchecked errors
    - govet # suspicious constructs
    - ineffassign # unused assignments
    - staticcheck # staticcheck rule set
    - unused # unused consts, vars, funcs, types

    # bug catchers
    - asasalint # []any passed as any to variadic
    - bodyclose # unclosed HTTP response bodies
    - clickhouselint # ClickHouse driver API misuse
    - durationcheck # multiplied durations
    - errchkjson # unsupported types in json encoding
    - exhaustive # missing enum switch cases
    - fatcontext # nested contexts in loops and func literals
    - forcetypeassert # unguarded type assertions
    - gocheckcompilerdirectives # malformed //go: directives
    - gochecksumtype # missing sum-type switch cases
    - makezero # append to non-zero-length make
    - musttag # missing struct tags in (un)marshal
    - nilerr # nil return after err != nil check
    - nilnesserr # wrong nil err returned
    - nilnil # nil error with invalid value
    - protogetter # proto fields read without getters
    - reassign # reassigned package variables
    - rowserrcheck # unchecked rows.Err
    - spancheck # unended OTel spans
    - sqlclosecheck # unclosed sql.Rows/Stmt
    - wastedassign # wasted assignments

    # idiom & convention
    - canonicalheader # non-canonical net/http.Header keys
    - containedctx # context.Context struct fields
    - copyloopvar # obsolete loop-var copies (Go 1.22+)
    - errname # ErrFoo / FooError naming
    - errorlint # errors.Is/As and %w wrapping
    - exptostd # x/exp funcs with std replacements
    - gochecknoglobals # global variables
    - gochecknoinits # init functions
    - gocognit # cognitive complexity
    - goconst # repeated strings that could be consts
    - gocritic # bug/perf/style diagnostics
    - goprintffuncname # printf-like funcs not ending in f
    - iface # interface pollution
    - inamedparam # unnamed interface method params
    - interfacebloat # oversized interfaces
    - intrange # for i := range n loops
    - mirror # needless bytes/string conversions
    - modernize # modern language and library features
    - nakedret # naked returns in long funcs
    - noctx # HTTP/SQL calls without context.Context
    - perfsprint # faster fmt.Sprintf alternatives
    - predeclared # shadowed predeclared identifiers
    - promlinter # Prometheus metric naming
    - recvcheck # mixed receiver types
    - revive # golint successor
    - unconvert # unnecessary type conversions
    - unparam # unused function parameters
    - usestdlibvars # stdlib consts over magic literals
    - wrapcheck # unwrapped errors from external packages

    # logging
    - loggercheck # logger key/value pairs
    - sloglint # consistent log/slog usage
    - zerologlint # zerolog without Msg/Send

    # tests
    - ginkgolinter # ginkgo/gomega assertion misuse
    - testableexamples # examples without expected output
    - testifylint # testify assertion usage
    - thelper # test helpers without t.Helper
    - tparallel # incorrect t.Parallel usage
    - usetesting # t.TempDir/t.Setenv/t.Context

    # comments, docs & hygiene
    - asciicheck # non-ASCII identifiers
    - bidichk # dangerous unicode sequences
    - dupword # duplicate words in comments
    - godoclint # godoc conventions
    - godot # comments end in a period
    - gomoddirectives # replace/retract/exclude in go.mod
    - iotamixing # iota mixed with explicit consts
    - misspell # misspelled words
    - nolintlint # ill-formed nolint directives
    - whitespace # stray blank lines at block edges

    # security
    - gosec # security issues

  settings:
    copyloopvar:
      check-alias: true # vv := v copies are as obsolete as v := v

    dupword:
      comments-only: true

    errcheck:
      check-blank: true # _ = f() discards an error as silently as ignoring it

    exhaustive:
      check: # enum-keyed map literals get the same treatment as switches
        - switch
        - map
      default-signifies-exhaustive: true # a default case covers the remaining values

    ginkgolinter:
      forbid-focus-container: true # focused specs silently skip the rest of the suite

    gocognit:
      min-complexity: 20

    goconst:
      eval-const-expressions: true # fold "a" + "b" before matching
      find-duplicates: true # also flag duplicates of existing consts

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - builtinShadow # duplicates predeclared
        - commentFormatting # duplicates revive comment-spacings
        - externalErrorReassign # duplicates reassign
        - hugeParam # flags ordinary value passing
        - importShadow # same noise profile as govet shadow, disabled below
        - nestingReduce # gocognit owns complexity
        - paramTypeCombine # combining param types is taste, not idiom
        - ptrToRefParam # pointer-vs-value API design is not idiom
        - rangeValCopy # flags ordinary value passing
        - todoCommentWithoutDetail # TODO policing is workflow, not idiom
        - tooManyResultsChecker # arbitrary numeric limit
        - unnamedResult # named returns are fine; nakedret polices the hazard
        - unnecessaryBlock # explicit blocks can aid readability
        - whyNoLint # duplicates nolintlint require-explanation

    godoclint:
      disable:
        - start-with-name # duplicates staticcheck ST1020-ST1022

    gosec:
      excludes:
        - G104 # duplicates errcheck

    govet:
      enable-all: true
      disable:
        - fieldalignment # memory layout over logical field grouping
        - shadow # too noisy; predeclared covers the dangerous cases

    iface:
      enable: # omits opaque, which flags any interface-returning func
        - identical
        - unused

    loggercheck:
      no-printf-like: true # printf verbs don't format in structured logging
      require-string-key: true # log keys must be constant strings

    misspell:
      locale: US

    modernize:
      disable:
        - forvar # duplicates copyloopvar
        - rangeint # duplicates intrange
        - testingcontext # duplicates usetesting

    nolintlint:
      require-explanation: true
      require-specific: true

    reassign:
      patterns: # any cross-package var reassignment, not just EOF/Err*
        - ".*"

    revive:
      enable-default-rules: true
      directives:
        - name: specify-disable-reason # revive:disable comments must say why
      rules:
        - name: comment-spacings
        - name: datarace
        - name: deep-exit # os.Exit/log.Fatal outside main or init
        - name: defer # deferred-call mistakes: recover placement, loop vars, returns
        - name: dot-imports
          disabled: true # duplicates staticcheck ST1001
        - name: early-return
        - name: enforce-slice-style # var s []T over empty literals and make
          arguments: [nil]
        - name: error-strings
          disabled: true # duplicates staticcheck ST1005
        - name: forbidden-call-in-wg-go # wg.Add/Done inside wg.Go
        - name: modifies-value-receiver # mutation of a value receiver is silently lost
        - name: package-comments
          disabled: true # package comments not required
        - name: redefines-builtin-id
          disabled: true # duplicates predeclared
        - name: redundant-import-alias
        - name: redundant-test-main-exit # os.Exit(m.Run()) obsolete since Go 1.15
        - name: unreachable-code
          disabled: true # duplicates govet unreachable
        - name: unused-parameter
          disabled: true # duplicates unparam
        - name: use-fmt-print # builtin print/println write to stderr unstably
        - name: var-naming
          disabled: true # duplicates staticcheck ST1003

    rowserrcheck:
      packages: # database/sql is always checked; extend to wrappers
        - github.com/jmoiron/sqlx

    sloglint:
      no-global: all # inject loggers; no package-level slog default
      static-msg: true # constant messages; variability belongs in attrs

    spancheck:
      checks:
        - end
        - record-error
        - set-status

    staticcheck:
      checks:
        - all # defaults skip the ST doc and naming conventions
        - -QF1001 # De Morgan rewrites are taste, not idiom
        - -QF1008 # explicit embedded-field selectors can aid clarity
        - -ST1000 # package comments not required

    testifylint:
      enable-all: true

    usestdlibvars: # defaults only cover http-method and http-status-code
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      time-layout: true
      tls-signature-scheme: true

    usetesting:
      context-background: true # flag context.Background too (off by default)
      context-todo: true # flag context.TODO too (off by default)
      os-temp-dir: true # flag os.TempDir too (off by default)

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gochecknoglobals # test fixtures
          - goconst # repeated literals are fine in tests
          - gosec # hardcoded creds, weak rand are fine in tests

formatters:
  enable:
    - gci # deterministic import ordering
    - gofumpt # stricter gofmt
    - goimports # add/remove imports
    - golines # wrap long lines
    - swaggo # format swaggo comments

  settings:
    gci:
      sections: # stdlib, then third-party, then this module
        - standard
        - default
        - localmodule

    gofumpt:
      extra-rules: true

    golines:
      max-len: 120

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false
